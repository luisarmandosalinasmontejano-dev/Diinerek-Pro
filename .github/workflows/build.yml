name: Crear APK

on:
  push:
    branches: [ main, master, Principal ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar la computadora
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev python3-setuptools libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev openjdk-17-jdk
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Configurar Buildozer
        run: |
          if [ ! -f "buildozer.spec" ]; then buildozer init; fi

      - name: Fabricar APK
        run: buildozer -v android debug

      - name: Guardar el APK
        uses: actions/upload-artifact@v4
        with:
          name: MiApp_Android
          path: bin/*.apk
