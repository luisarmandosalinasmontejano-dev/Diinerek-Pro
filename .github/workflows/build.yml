name: Crear APK

on:
  push:
    branches: [ main, master, Principal ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Preparar la computadora
        run: |
          sudo rm -f /etc/apt/apt.conf.d/50appstream
          sudo apt-get update || true
          sudo apt-get install -y build-essential git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libltdl-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 virtualenv

      - name: Configurar Buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          if [ ! -f "buildozer.spec" ]; then yes | buildozer init; fi

      - name: Fabricar APK
        run: |
          export PATH=$PATH:~/.local/bin
          yes | buildozer -v android debug

      - name: Guardar el APK
        uses: actions/upload-artifact@v4
        with:
          name: MiApp_Android
          path: bin/*.apk
